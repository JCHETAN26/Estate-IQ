services:
  postgres:
    image: postgres:16-alpine
    container_name: estate-iq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: estate_iq
    ports:
      - "5434:5432"
    volumes:
      - estate-iq-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d estate_iq"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  estate-iq-postgres-data:
